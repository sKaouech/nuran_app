name: nuran
description: "Nuran — Mémorisez le Coran, jour après jour."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Persistence
  shared_preferences: ^2.2.3

  # I18n
  intl: any

  # UI helpers (Google Fonts for arabic Amiri until we ship KFGQPC locally)
  google_fonts: ^6.2.1

  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # ASR (reconnaissance vocale on-device)
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  remove_alpha_ios: true
  background_color_ios: "#1B5E4F"
  adaptive_icon_background: "#1B5E4F"
  adaptive_icon_foreground: "assets/branding/icon.png"

flutter_native_splash:
  color: "#1B5E4F"
  image: assets/branding/icon.png
  color_dark: "#1C1B1A"
  image_dark: assets/branding/icon.png
  android_12:
    color: "#1B5E4F"
    image: assets/branding/icon.png
    color_dark: "#1C1B1A"
    image_dark: assets/branding/icon.png
  ios: true
  android: true
  fullscreen: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/surahs.json
    - assets/data/verses_ar_uthmani.json
    - assets/data/translation_fr_hamidullah.json
    - assets/data/translation_en_sahih.json
